<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicMatch IA</title>
    <style>
        body {margin:0;font-family:Arial,sans-serif;background:#111;color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh}
        main {background:#1b1b1b;padding:30px;border-radius:15px;width:90%;max-width:700px;box-shadow:0 0 20px #000}
        h1 {text-align:center}
        textarea {width:100%;height:140px;border:none;border-radius:10px;padding:12px;background:#2a2a2a;color:#fff;resize:none;font-size:16px}
        button {width:100%;margin-top:15px;padding:16px;border:none;border-radius:10px;background:#00c853;color:#fff;font-size:18px;cursor:pointer}
        button:hover {background:#00a844}
        #resultado {margin-top:20px;padding:15px;background:#222;border-radius:10px;white-space:pre-wrap;line-height:1.6}
    </style>
</head>
<body>
    <main>
        <h1>🎵 MusicMatch IA</h1>
        <p>Digite seus artistas favoritos (separados por vírgula):</p>
        <textarea id="artistas" placeholder="Ex.: Radiohead, Charli XCX, Tyler The Creator"></textarea>
        <button onclick="buscar()">Descobrir artistas</button>
        <div id="resultado"></div>
    </main>

    <script>
        const API_KEY = "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";

        async function buscar() {
            const input = document.getElementById("artistas").value.trim();
            const resultado = document.getElementById("resultado");
            
            if (!input) {
                resultado.innerHTML = "<strong style='color:red'>Digite pelo menos um artista.</strong>";
                return;
            }

            resultado.innerHTML = "Carregando recomendações...";

            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [
                            { role: "system", content: "Especialista em música. Recomende artistas semelhantes em português." },
                            { role: "user", content: `Recomende artistas parecidos com: ${input}` }
                        ],
                        temperature: 0.7,
                        max_tokens: 800
                    })
                });

                if (!response.ok) throw new Error("Erro API");
                const data = await response.json();
                const texto = data.choices[0].message.content;
                resultado.innerHTML = `<strong>Recomendações:</strong><br><br>${texto.replace(/\n/g, '<br>')}`;
            } catch (e) {
                resultado.innerHTML = "<strong style='color:red'>Erro ao conectar com a OpenAI. Tente novamente.</strong>";
            }
        }
    </script>
</body>
</html>
