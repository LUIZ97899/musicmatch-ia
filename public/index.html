<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>MusicMatch IA</title>
<style>
body{background:#111;color:#fff;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh}
main{width:700px}
textarea{width:100%;height:120px}
button{width:100%;padding:12px;margin-top:10px}
pre{white-space:pre-wrap}
</style>
</head>
<body>
<main>
<h1>MusicMatch IA</h1>
<textarea id="artistas" placeholder="Radiohead, Converge, Charli XCX"></textarea>
<button onclick="buscar()">Descobrir artistas</button>
<pre id="resultado"></pre>

<script>
async function buscar(){
const artistas=document.getElementById("artistas").value;
const r=document.getElementById("resultado");
r.textContent="Carregando...";

const req=await fetch("/api/recomendar",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({artistas})
});

const json=await req.json();
r.textContent=json.resposta||json.erro;
}
</script>

</main>
</body>
</html>
